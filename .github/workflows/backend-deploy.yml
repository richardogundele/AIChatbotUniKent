name: Deploy Python Backend to Azure App Service

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies locally for deployment
        run: |
          cd backend
          pip install -r requirements.txt --target .

      - name: Syntax check
        run: |
          cd backend
          python -m py_compile main.py ingest.py
          echo "Syntax check passed"

      - name: Zip script payload for deployment
        run: |
          cd backend
          zip -r ../backend-release.zip .

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'chariotai-api-prod'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: backend-release.zip

      - name: Post-deploy health check
        run: |
          echo "Waiting for app to start..."
          sleep 30
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://chariotai-api-prod.azurewebsites.net/health)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (HTTP $STATUS)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS, retrying in 15s..."
            sleep 15
          done
          echo "Health check failed after 3 attempts"
          exit 1
